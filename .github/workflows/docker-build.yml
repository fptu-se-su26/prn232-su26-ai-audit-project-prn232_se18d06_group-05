name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'source/web/TripMate_Webapi/**'
      - '.github/workflows/docker-build.yml'
  # Temporarily disable for pull requests to avoid Docker Hub login issues
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - 'source/web/TripMate_Webapi/**'
  workflow_dispatch:

env:
  IMAGE_NAME: tripmate-webapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_USERNAME || 'tripmate' }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (test build for PRs)
        if: github.event_name == 'pull_request' || secrets.DOCKER_USERNAME == ''
        uses: docker/build-push-action@v5
        with:
          context: ./source/web/TripMate_Webapi
          file: ./source/web/TripMate_Webapi/Dockerfile
          push: false
          tags: test-build:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: ./source/web/TripMate_Webapi
          file: ./source/web/TripMate_Webapi/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != ''
        run: echo ${{ steps.meta.outputs.digest }}

      - name: Summary
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != ''
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Image built and pushed successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build Summary (Test Build)
        if: github.event_name == 'pull_request' || secrets.DOCKER_USERNAME == ''
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Docker image built successfully (test build)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ This was a test build only. No image was pushed to registry." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable pushing to Docker Hub:" >> $GITHUB_STEP_SUMMARY
          echo "1. Set up DOCKER_USERNAME and DOCKER_PASSWORD secrets in repository settings" >> $GITHUB_STEP_SUMMARY
          echo "2. Re-run the workflow" >> $GITHUB_STEP_SUMMARY
