name: AI Audit Log Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-required-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required documentation files
        run: |
          test -f AI_AUDIT_LOG.md || (echo "Missing AI_AUDIT_LOG.md" && exit 1)
          test -f PROMPTS.md || (echo "Missing PROMPTS.md" && exit 1)
          test -f REFLECTION.md || (echo "Missing REFLECTION.md" && exit 1)
          test -f CHANGELOG.md || (echo "Missing CHANGELOG.md" && exit 1)

      - name: Check required docs are not empty
        run: |
          test -s AI_AUDIT_LOG.md || (echo "AI_AUDIT_LOG.md is empty" && exit 1)
          test -s PROMPTS.md || (echo "PROMPTS.md is empty" && exit 1)
          test -s REFLECTION.md || (echo "REFLECTION.md is empty" && exit 1)
          test -s CHANGELOG.md || (echo "CHANGELOG.md is empty" && exit 1)